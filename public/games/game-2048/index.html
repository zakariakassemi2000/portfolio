<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>2048 — MCTS AI</title><link rel="stylesheet" href="css/style.css"/></head>
<body>
<div id="top-bar">
  <div class="stat"><span class="stat-label">SCORE</span><span class="stat-val" id="s-score">0</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="stat-label">BEST TILE</span><span class="stat-val" id="s-tile">0</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="stat-label">MOVES</span><span class="stat-val" id="s-moves">0</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="stat-label">GAMES</span><span class="stat-val" id="s-games">0</span></div>
  <div id="speed-wrap">
    <label>SPEED</label>
    <input type="range" id="speed" min="1" max="30" value="5" step="1"/>
    <span id="speed-val">5x</span>
  </div>
</div>
<div id="main">
  <div id="board-wrap"><canvas id="board-canvas"></canvas></div>
  <div id="tree-wrap">
    <div id="tree-panel"><canvas id="tree-canvas"></canvas></div>
    <div id="nn-panel"><canvas id="nn-canvas"></canvas></div>
  </div>
</div>
<script src="js/pause.js"></script>
<script src="js/mcts.js"></script>
<script src="js/nn-draw.js"></script>
<script src="js/main.js"></script>
<div style="position:fixed;bottom:10px;right:14px;font-family:Courier New,monospace;font-size:9px;color:#0f2010;letter-spacing:2px;z-index:100;pointer-events:none">[P] / [SPACE] PAUSE</div>
</body>
</html>
