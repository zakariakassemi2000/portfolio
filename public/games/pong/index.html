<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>Pong — DQN Self-Play</title><link rel="stylesheet" href="css/style.css"/></head>
<body>
<div id="top-bar">
  <div class="stat"><span class="stat-label">LEFT SCORE</span><span class="stat-val" id="s-l">0</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="stat-label">RIGHT SCORE</span><span class="stat-val" id="s-r">0</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="stat-label">RALLY</span><span class="stat-val" id="s-rally">0</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="stat-label">EPISODES</span><span class="stat-val" id="s-ep">0</span></div>
  <div id="speed-wrap">
    <label>SPEED</label>
    <input type="range" id="speed" min="1" max="15" value="3" step="1"/>
    <span id="speed-val">3x</span>
  </div>
</div>
<div id="main">
  <canvas id="game-canvas"></canvas>
  <div id="nn-wrap"><canvas id="nn-canvas"></canvas></div>
</div>
<script src="js/pause.js"></script>
<script src="js/dqn.js"></script>
<script src="js/nn-draw.js"></script>
<script src="js/main.js"></script>
<div style="position:fixed;bottom:10px;right:14px;font-family:Courier New,monospace;font-size:9px;color:#0f2010;letter-spacing:2px;z-index:100;pointer-events:none">[P] / [SPACE] PAUSE</div>
</body>
</html>
